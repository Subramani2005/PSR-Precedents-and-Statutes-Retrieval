<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSR | Advanced Legal Retrieval</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-indigo-900 text-white shadow-sm py-4 px-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">PSR System</h1>
                <p class="text-indigo-200 text-xs mt-0.5">Advanced Legal Research & Retrieval</p>
            </div>
            <div class="flex items-center space-x-2 bg-indigo-950/50 px-2.5 py-1 rounded-md border border-indigo-700/30">
                <span id="status-dot" class="h-2 w-2 rounded-full bg-red-500 animate-pulse"></span>
                <span id="status-text" class="text-xs font-medium text-indigo-100">Connecting to API...</span>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto w-full p-4 md:p-6">
        
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6">
            <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1.5">Legal Query / Scenario</label>
            <div class="flex flex-col sm:flex-row gap-3">
                
                <div class="relative flex-grow">
                    <input type="text" id="search-input" class="bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5 pl-9" placeholder="Describe the legal situation or enter keywords...">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>

                <button onclick="performSearch()" id="search-btn" class="w-full sm:w-auto text-white bg-indigo-600 hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-200 font-medium rounded-lg text-sm px-6 py-2.5 transition duration-150 ease-in-out flex items-center justify-center min-w-[120px]">
                    <span>Search</span>
                </button>
            </div>

            <div id="expanded-query-container" class="hidden mt-3 p-3 bg-indigo-50 rounded-lg border border-indigo-100 shadow-inner">
                <div class="flex items-center space-x-2 mb-0.5">
                    <svg class="w-3.5 h-3.5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    <p class="text-[10px] text-indigo-800 font-bold uppercase tracking-wider">AI Expanded Search Scope:</p>
                </div>
                <p id="expanded-query-text" class="text-xs text-indigo-700 italic"></p>
            </div>
        </div>

        <div id="feedback-container">
            <div class="text-center text-slate-400 py-12 bg-white rounded-xl border border-dashed border-slate-200" id="placeholder-msg">
                <p class="text-base font-medium">System Ready</p>
                <p class="text-xs text-slate-400 mt-0.5">Submit a search query above to instantly retrieve relevant Statutes and Precedents.</p>
            </div>
        </div>

        <div id="results-wrapper" class="hidden flex flex-col gap-6">
            
            <div class="flex flex-col">
                <h2 class="text-lg font-bold text-slate-800 mb-3 pb-1.5 border-b-2 border-purple-500 flex items-center">
                    <span class="text-xl mr-2">📜</span> Relevant Statutes
                </h2>
                <div id="statutes-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

            <div class="flex flex-col">
                <h2 class="text-lg font-bold text-slate-800 mb-3 pb-1.5 border-b-2 border-blue-500 flex items-center">
                    <span class="text-xl mr-2">🏛️</span> Legal Precedents
                </h2>
                <div id="precedents-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

        </div>
    </main>

    <footer class="bg-slate-100 border-t border-slate-200 py-3 text-center text-[11px] text-slate-500 mt-auto">
        PSR System &bull; Production Legal Retrieval Engine
    </footer>

    <script>
        const API_BASE = "https://subramani2005-psr-backend.hf.space";

        window.addEventListener('DOMContentLoaded', async () => {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            
            try {
                const res = await fetch(`${API_BASE}/health`);
                const data = await res.json();
                
                if (res.ok && data.database === true) {
                    dot.classList.remove('bg-red-500', 'animate-pulse');
                    dot.classList.add('bg-emerald-500');
                    text.textContent = "System Online";
                    text.classList.remove('text-indigo-100');
                    text.classList.add('text-emerald-400');
                } else {
                    throw new Error("Database disconnected.");
                }
            } catch (e) {
                dot.classList.remove('animate-pulse');
                dot.classList.add('bg-red-500');
                text.textContent = "Backend Offline";
                text.classList.add('text-red-400');
            }
        });

        document.getElementById("search-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") performSearch();
        });

        async function performSearch() {
            const query = document.getElementById("search-input").value.trim();
            const feedbackContainer = document.getElementById("feedback-container");
            const resultsWrapper = document.getElementById("results-wrapper");
            const btn = document.getElementById("search-btn");
            const expContainer = document.getElementById("expanded-query-container");

            if (!query) return;

            btn.disabled = true;
            expContainer.classList.add('hidden');
            resultsWrapper.classList.add('hidden'); 
            feedbackContainer.classList.remove('hidden'); 
            
            btn.innerHTML = `<svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
            feedbackContainer.innerHTML = `
                <div class="text-center py-12 bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col items-center justify-center">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600 mb-3"></div>
                    <p class="text-indigo-600 text-sm font-medium">Analyzing Legal Context...</p>
                    <p class="text-slate-400 text-[11px] mt-0.5">Extracting vectors and ranking documents via Cross-Encoder matrix.</p>
                </div>`;

            try {
                const response = await fetch(`${API_BASE}/api/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, top_k: 40 })
                });

                if (!response.ok) throw new Error("Search execution failed.");
                const data = await response.json();
                
                if (data.expanded_query && data.expanded_query !== query) {
                    document.getElementById("expanded-query-text").textContent = data.expanded_query;
                    expContainer.classList.remove('hidden');
                }

                feedbackContainer.classList.add('hidden');
                resultsWrapper.classList.remove('hidden');

                renderResults(data.results);
            } catch (error) {
                resultsWrapper.classList.add('hidden');
                feedbackContainer.classList.remove('hidden');
                feedbackContainer.innerHTML = `
                    <div class="p-4 border border-red-200 rounded-xl bg-red-50 text-red-800 shadow-sm">
                        <div class="flex items-center space-x-2 font-semibold text-sm">
                            <svg class="w-4 h-4 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                            <span>API Connection Failure</span>
                        </div>
                        <p class="text-xs mt-0.5 text-red-700">Unable to complete search request. Please verify the backend is active.</p>
                    </div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>Search</span>`;
            }
        }

        function renderResults(results) {
            const statContainer = document.getElementById("statutes-container");
            const precContainer = document.getElementById("precedents-container");
            
            statContainer.innerHTML = "";
            precContainer.innerHTML = "";

            let statutesCount = 0;
            let precedentsCount = 0;

            if (!results || results.length === 0) {
                document.getElementById("feedback-container").classList.remove('hidden');
                document.getElementById("results-wrapper").classList.add('hidden');
                document.getElementById("feedback-container").innerHTML = `
                    <div class="text-center text-slate-400 py-12 bg-white rounded-xl border border-slate-200 shadow-sm">
                        <p class="text-base font-medium">No Relevant Matches Found</p>
                        <p class="text-xs text-slate-400 mt-0.5">Try modifying your legal phrasing.</p>
                    </div>`;
                return;
            }

            results.forEach((item) => {
                const p = item.payload;
                const isCase = p._source_type === "cases_meta";
                
                const rawScore = item.score;
                let displayScore = (1 / (1 + Math.exp(-rawScore))) * 100;

                // Confidence threshold filtering
                if (displayScore < 50.0) {
                    return; 
                }

                // Compact layout card wrapper with metrics entirely removed
                let cardHTML = `<div class="bg-white rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition duration-200 flex flex-col justify-between overflow-hidden">
                    <div class="h-1 w-full ${isCase ? 'bg-blue-500' : 'bg-purple-500'}"></div>
                    <div class="p-4">`;

                if (isCase) {
                    precedentsCount++;
                    cardHTML += `
                        <h3 class="text-base font-bold text-slate-900 leading-snug mb-1.5">${p.case_title || "Untitled Judgment Record"}</h3>
                        <div class="flex flex-wrap gap-1.5 mb-3">
                            <span class="bg-slate-100 text-slate-600 text-[11px] font-medium px-2 py-0.5 rounded-md">📅 ${p._year || "N/A"}</span>
                            <span class="bg-slate-100 text-slate-600 text-[11px] font-medium px-2 py-0.5 rounded-md">⚖️ ${p.classification || "General Civil"}</span>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                            <h4 class="text-[9px] font-bold uppercase tracking-wider text-slate-400 mb-1">Contextual Summary</h4>
                            <p class="text-slate-700 text-xs leading-relaxed whitespace-pre-line">${p.case_summary}</p>
                        </div>`;
                    cardHTML += `</div></div>`;
                    precContainer.innerHTML += cardHTML;
                } else {
                    statutesCount++;
                    cardHTML += `
                        <h3 class="text-base font-bold text-slate-900 leading-snug mb-1.5">${p.title || "Statutory Provision Block"}</h3>
                        <div class="flex flex-wrap gap-1.5 mb-3">
                            <span class="bg-slate-100 text-slate-700 border border-slate-200 text-[11px] font-semibold px-2 py-0.5 rounded-md">${p.act_name || "Family Law Asset"}</span>
                            <span class="bg-slate-100 text-slate-700 border border-slate-200 text-[11px] font-semibold px-2 py-0.5 rounded-md">Sec: ${p.section_number || "N/A"}</span>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                            <h4 class="text-[9px] font-bold uppercase tracking-wider text-slate-400 mb-1">Statutory Extract</h4>
                            <p class="text-slate-700 text-xs leading-relaxed">${p.short_summary}</p>
                        </div>`;
                    cardHTML += `</div></div>`;
                    statContainer.innerHTML += cardHTML;
                }
            });

            if (statutesCount === 0) {
                statContainer.innerHTML = `<div class="col-span-full text-center p-4 bg-slate-50 border border-dashed border-slate-200 rounded-xl text-slate-400 text-xs">No highly relevant statutes found for this query.</div>`;
            }
            if (precedentsCount === 0) {
                precContainer.innerHTML = `<div class="col-span-full text-center p-4 bg-slate-50 border border-dashed border-slate-200 rounded-xl text-slate-400 text-xs">No highly relevant precedents found for this query.</div>`;
            }
        }
    </script>
</body>
</html>
